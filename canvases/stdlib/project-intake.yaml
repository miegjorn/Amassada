id: project-intake
version: "1.0.0"
mode: interactive
selector:
  description: "Define a new project from a business idea or brief — produces artifacts consumed by design sessions"
  tags: [project, intake, planning, milestones, breakdown, discovery, requirements]
  examples:
    - "I want to build a SaaS platform for X"
    - "we need to scope out a new feature for Y"
    - "turn this idea into a project plan with milestones and spikes"
initial_participants:
  - persona: moderator
    domain: fondament/project-moderator
  - persona: analyst
    domain: fondament/business-analyst
  - persona: architect
    domain: fondament/app-architect
  - persona: human
    authority: binding
budget:
  total_tokens: 600000
  pools:
    main_session: 480000
    consultations: 90000
    mod_whisper: 30000
consultation:
  max_turns: 2
  min_response_tokens: 80
rounds:
  min: 3
  max: 8
  convergence_modifier: 0.85
  context_window: 20
human:
  slot: true
  advisory_window_turns: 1
output:
  format: markdown
  sections:
    - id: project-brief
      title: "Project Brief"
      required: true
    - id: milestone-plan
      title: "Milestone Plan"
      required: true
    - id: spike-list
      title: "Spike List"
      required: true
    - id: task-breakdown
      title: "Initial Task Breakdown"
      required: true
