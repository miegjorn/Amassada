id: code-review
version: "1.0.0"
mode: auto
selector:
  description: "Code review council — reviewer and security analyst assess a merge request"
  tags: [code-review, merge-request, pr, security, quality, review]
  examples:
    - "review this merge request"
    - "code review for the auth module changes"
    - "security and quality review before merge"
initial_participants:
  - persona: moderator
    domain: fondament/review-moderator
  - persona: reviewer
    domain: fondament/code-reviewer
  - persona: security
    domain: fondament/security-analyst
  - persona: human
    authority: binding
budget:
  total_tokens: 150000
  pools:
    main_session: 120000
    consultations: 22500
    mod_whisper: 7500
consultation:
  max_turns: 2
  min_response_tokens: 50
rounds:
  min: 1
  max: 3
  convergence_modifier: 0.75
  context_window: 20
human:
  slot: true
  advisory_window_turns: 1
output:
  format: markdown
  sections:
    - id: review-report
      title: "Review Report"
      required: true
