id: planning
version: "1.0.0"
mode: interactive
selector:
  description: "Sprint or project planning session; produces prioritised action-item list"
  tags: [planning, sprint, backlog, roadmap, tasks, priorities]
  examples:
    - "plan the Q3 sprint"
    - "prioritise the backlog for the auth team"
initial_participants:
  - persona: moderator
    domain: fondament/tech-moderator
  - persona: builder
    domain: fondament/senior-engineer
  - persona: human
    authority: binding
budget:
  total_tokens: 80000
  pools:
    main_session: 65000
    consultations: 10000
    mod_whisper: 5000
consultation:
  max_turns: 2
  min_response_tokens: 30
rounds:
  min: 2
  max: 5
  convergence_modifier: 0.8
  context_window: 20
human:
  slot: true
  advisory_window_turns: 1
output:
  format: markdown
  sections:
    - id: goals
      title: "Sprint Goals"
      required: true
    - id: tasks
      title: "Task List"
      required: true
    - id: risks
      title: "Risks"
      required: false
