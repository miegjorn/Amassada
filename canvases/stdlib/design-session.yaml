id: design-session
version: "1.0.0"
mode: interactive
selector:
  description: "Collaborative design session with human as final decision-maker, produces ADR"
  tags: [design, architecture, adr, interactive, collaborative]
  examples:
    - "design the auth service"
    - "how should we structure the data pipeline?"
    - "let's design the API gateway"
initial_participants:
  - persona: moderator
    domain: fondament/tech-moderator
  - persona: builder
    domain: fondament/senior-engineer
  - persona: human
    authority: binding
budget:
  total_tokens: 150000
  pools:
    main_session: 120000
    consultations: 20000
    mod_whisper: 10000
consultation:
  max_turns: 2
  min_response_tokens: 50
rounds:
  min: 2
  max: 8
  convergence_modifier: 0.7
  context_window: 25
human:
  slot: true
  advisory_window_turns: 2
output:
  format: markdown
  sections:
    - id: decision
      title: "Architecture Decision"
      required: true
    - id: components
      title: "Components & Interfaces"
      required: true
    - id: risks
      title: "Risks & Mitigations"
      required: true
    - id: actions
      title: "Action Items"
      required: false
