name: Build & push

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'canvases/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'canvases/**'
      - '.github/workflows/build.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # amassada-core has a path dep on fondament-core (../../Fondament/fondament-core).
      # Check it out as a named build context so the relative path resolves in Docker.
      - uses: actions/checkout@v4
        with:
          repository: miegjorn/Fondament
          path: fondament-src
          token: ${{ secrets.MIEGJORN_CI_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/miegjorn/amassada
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v5
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-contexts: |
            fondament=./fondament-src
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

  update-caissa:

    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: miegjorn/Caissa
          token: ${{ secrets.MIEGJORN_CI_TOKEN }}
          ref: main
      - uses: mikefarah/yq@v4
      - name: Bump image tag
        run: |
          export TAG="sha-${GITHUB_SHA:0:7}"
          yq -i '.amassada.imageTag = env(TAG)' deploy/charts/occitan/values.yaml
          git config user.email "ci@miegjorn.dev"
          git config user.name "Occitan CI"
          git add deploy/charts/occitan/values.yaml
          git diff --staged --quiet && echo "no-op" || \
            git commit -m "chore(amassada): deploy sha-${GITHUB_SHA:0:7}" && \
            git pull --rebase origin main && git push
